<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Canvas HiDPI 캔들 차트 비교</title>
    <link rel="stylesheet" href="styles.css?v=3" />
  </head>
  <body>
    <header class="page-header">
      <h1>Canvas HiDPI 캔들 차트 비교</h1>
      <p class="lead">
        확대해 최고가·최저가 글자의 선명도를 비교해 보세요.
        Shift+드래그 또는 「영역 확대」 켠 뒤 드래그하면 구간 확대됩니다.
      </p>
      <p id="dpr-label" class="dpr-label">현재 devicePixelRatio: —</p>
    </header>

    <section class="toolbar" aria-label="공통 조작">
      <div class="toolbar-group">
        <button type="button" data-action="zoom-in">확대</button>
        <button type="button" data-action="zoom-out">축소</button>
        <button type="button" data-action="reset">리셋</button>
        <button type="button" data-action="preset-500">500개</button>
        <button type="button" data-action="preset-40">40개</button>
        <button
          type="button"
          id="range-zoom-toggle"
          aria-pressed="false"
          title="켜면 드래그로 구간 확대 (데스크톱은 Shift+드래그도 가능)"
        >
          영역 확대
        </button>
      </div>
      <div class="toolbar-group">
        <label class="sync-label">
          <input type="checkbox" id="sync-toggle" />
          동기화
        </label>
        <button type="button" data-action="align-now">지금 맞추기</button>
      </div>
    </section>

    <main class="charts">
      <article class="chart-panel" id="panel-raw" data-chart-id="raw">
        <div class="panel-header">
          <h2>DPR 미적용</h2>
          <span class="active-badge" hidden>조작 중</span>
        </div>
        <div class="panel-controls">
          <button type="button" data-local-action="zoom-in">확대</button>
          <button type="button" data-local-action="zoom-out">축소</button>
          <button type="button" data-local-action="reset">리셋</button>
        </div>
        <div class="canvas-wrap">
          <canvas id="chart-raw" aria-label="DPR 미적용 캔들 차트"></canvas>
        </div>
      </article>

      <article class="chart-panel is-active" id="panel-dpr" data-chart-id="dpr">
        <div class="panel-header">
          <h2>DPR 적용</h2>
          <span class="active-badge">조작 중</span>
        </div>
        <div class="panel-controls">
          <button type="button" data-local-action="zoom-in">확대</button>
          <button type="button" data-local-action="zoom-out">축소</button>
          <button type="button" data-local-action="reset">리셋</button>
        </div>
        <div class="canvas-wrap">
          <canvas id="chart-dpr" aria-label="DPR 적용 캔들 차트"></canvas>
        </div>
      </article>
    </main>

    <script src="chart.js?v=3"></script>
  </body>
</html>
